app-id: io.github.PSGtatitos.papyrus
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: papyrus

finish-args:
  # Wayland access for mpvpaper layer shell
  - --socket=wayland
  # GPU access for mpvpaper OpenGL rendering
  - --device=dri
  # Access to home directory for wallpaper videos
  - --filesystem=home
  # Access to COSMIC theme config files
  - --filesystem=~/.config/cosmic:rw
  # Allow talking to the session bus (for future dbus support)
  - --socket=session-bus
  # Share IPC namespace (required for Wayland shared memory)
  - --share=ipc

modules:
  # ── mpv (required by mpvpaper) ─────────────────────────────────────────────
  - name: libmpv
    cleanup:
      - /include
      - /lib/pkgconfig
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dbuild-date=false
      - -Dalsa=disabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.38.0.tar.gz
        sha256: 86d9ef40b6058732f67b46d0bbda24a074fae860b3eaae05bab3145041303066

  # ── mpvpaper ───────────────────────────────────────────────────────────────
  - name: mpvpaper
    buildsystem: meson
    config-opts:
      - --prefix=/app
    sources:
      - type: git
        url: https://github.com/GhostNaN/mpvpaper.git
        branch: master

  # ── Python dependencies ────────────────────────────────────────────────────
  - name: python3-pillow
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links="file://${PWD}" --prefix=/app pillow
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/source/P/Pillow/Pillow-10.3.0.tar.gz
        sha256: 9d2455fbf44c914840c793e89aa82d0e1763a14253a000743a384d6cfa31adc5

  # ── Papyrus itself ─────────────────────────────────────────────────────────
  - name: papyrus
    buildsystem: simple
    build-commands:
      # install the main script
      - install -Dm755 papyrus.py /app/bin/papyrus
      # install the desktop entry
      - install -Dm644 io.github.PSGtatitos.papyrus.desktop /app/share/applications/io.github.PSGtatitos.papyrus.desktop
      # install the icon at multiple sizes
      - install -Dm644 assets/icon.png /app/share/icons/hicolor/256x256/apps/io.github.PSGtatitos.papyrus.png
      # install appstream metainfo
      - install -Dm644 io.github.PSGtatitos.papyrus.metainfo.xml /app/share/metainfo/io.github.PSGtatitos.papyrus.metainfo.xml
    sources:
      - type: git
        url: https://github.com/PSGtatitos/papyrus.git
        branch: main
