name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 \
            python3-pip \
            python3-gi \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            ffmpeg \
            mpvpaper

      - name: Install Python dependencies
        run: |
          pip3 install pillow --break-system-packages

      - name: Check if script runs without errors
        run: |
          python3 -m pycompile papyrus.py
          echo "✅ Syntax check passed"

      - name: Basic runtime test
        run: |
          # Test that the app can import modules and start (without GUI)
          python3 -c '
          import gi
          gi.require_version("Gtk", "4.0")
          gi.require_version("Adw", "1")
          from gi.repository import Gtk, Adw, Gio
          print("✅ GTK + Adw imports successful")
          
          import subprocess
          print("✅ All core dependencies available")
          ' 