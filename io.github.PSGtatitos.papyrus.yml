app-id: io.github.PSGtatitos.papyrus
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: papyrus

finish-args:
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --filesystem=~/.config/cosmic:rw
  - --socket=session-bus
  - --share=ipc

modules:
  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dvulkan=disabled
      - -Dglslang=disabled
      - -Ddemos=false
    sources:
      - type: git
        url: https://code.videolan.org/videolan/libplacebo.git
        tag: v7.349.0
        disable-submodules: false

  - name: libass
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.3/libass-0.17.3.tar.xz
        sha256: eae425da50f0015c21f7b3a9c7262a910f0218af469e22e2931462fed3c50959

  - name: libmpv
    cleanup:
      - /include
      - /lib/pkgconfig
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dbuild-date=false
      - -Dalsa=disabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.38.0.tar.gz
        sha256: 86d9ef40b6058732f67b46d0bbda24a074fae860b3eaae05bab3145041303066

  - name: mpvpaper
    buildsystem: meson
    config-opts:
      - --prefix=/app
    sources:
      - type: git
        url: https://github.com/GhostNaN/mpvpaper.git
        branch: master

  - name: python3-pybind11
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --no-build-isolation --no-deps --find-links="file://${PWD}" --prefix=/app pybind11-2.13.6.tar.gz
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/source/p/pybind11/pybind11-2.13.6.tar.gz
        sha256: ba6af10348c12b24e92fa086b39cfba0eff619b61ac77c406167d813b096d39a

  - name: python3-pillow
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --no-build-isolation --no-deps --find-links="file://${PWD}" --prefix=/app pillow-10.4.0.tar.gz
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/source/p/pillow/pillow-10.4.0.tar.gz
        sha256: 166c1cd4d24309b30d61f79f4a9114b7b2313d7450912277855ff5dfd7cd4a06

  - name: papyrus
    buildsystem: simple
    build-commands:
      - install -Dm755 papyrus.py /app/bin/papyrus
      - install -Dm644 io.github.PSGtatitos.papyrus.desktop /app/share/applications/io.github.PSGtatitos.papyrus.desktop
      - install -Dm644 assets/icon.png /app/share/icons/hicolor/256x256/apps/io.github.PSGtatitos.papyrus.png
      - install -Dm644 io.github.PSGtatitos.papyrus.metainfo.xml /app/share/metainfo/io.github.PSGtatitos.papyrus.metainfo.xml
    sources:
      - type: git
        url: https://github.com/PSGtatitos/papyrus.git
        branch: main